<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Media Marketing Preview | Coffee Cat Café</title>
<link rel="stylesheet" href="css/contact.css">
</head>
<body>
<section class="social-preview" style="text-align: center;">
    <h1>Social Media Marketing Mockups</h1>
    <div class="social-grid">
        <div class="social-card">
            <h2>Facebook Post</h2>
            <img src="images/fb.png" alt="Facebook Post" style="max-width:100%; border-radius:8px;">
        </div>

        <div class="social-card">
            <h2>Instagram Post</h2>
            <img src="images/ig.png" alt="Instagram Post" style="max-width:100%; border-radius:8px;">
        </div>

        <div class="social-card">
            <h2>Twitter Post</h2>
            <img src="images/twitter.png" alt="twitter Post" style="max-width:100%; border-radius:8px;">
        </div>
    </div>
</section>
</body>
</html>
